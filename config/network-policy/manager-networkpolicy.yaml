apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: controller-manager
  namespace: system
  labels:
    control-plane: argocd-operator
spec:
  podSelector:
    matchLabels:
      control-plane: argocd-operator
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        # health probes (kubelet)
        - protocol: TCP
          port: 8081
        # CRD conversion webhook (API server, handler registered when ENABLE_CONVERSION_WEBHOOK=true)
        - protocol: TCP
          port: 9443
        # metrics (Prometheus)
        - protocol: TCP
          port: 8080
        # metrics via kube-rbac-proxy (when manager_auth_proxy_patch is enabled)
        - protocol: TCP
          port: 8443
  egress:
    # Kubernetes API server
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    # DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
