apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  creationTimestamp: null
  labels:
    control-plane: controller-manager
  name: argocd-operator-controller-manager
spec:
  podSelector:
    matchLabels:
      control-plane: controller-manager
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        # health probes (kubelet)
        - protocol: TCP
          port: 8081
        # CRD conversion webhook (API server)
        - protocol: TCP
          port: 9443
        # metrics (Prometheus)
        - protocol: TCP
          port: 8080
        # metrics via kube-rbac-proxy (when auth proxy is enabled)
        - protocol: TCP
          port: 8443
  egress:
    # Kubernetes API server
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    # DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
