# This patch configures the manager to serve metrics securely using
# controller-runtime's built-in authn/authz (replacing the deprecated
# kube-rbac-proxy sidecar).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
spec:
  template:
    spec:
      containers:
      - name: manager
        args:
        - "--health-probe-bind-address=:8081"
        - "--metrics-bind-address=:8443"
        - "--metrics-secure"
        - "--leader-elect"
        ports:
        - containerPort: 8443
          protocol: TCP
          name: https
        securityContext:
          capabilities:
            drop:
            - ALL
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
---
# Keep the metrics service in sync with the secure-manager patch above.
apiVersion: v1
kind: Service
metadata:
  name: controller-manager-metrics-service
  namespace: system
spec:
  ports:
  - name: https
    port: 8443
    targetPort: https
