# Example: declarative Git webhook credentials via spec.webhookSecrets on the ArgoCD CR.
# The operator copies referenced Secret keys into argocd-secret for Argo CD.
#
# Replace the placeholder webhook value, adjust namespace/metadata as needed, then apply:
#   kubectl apply -n argocd -f examples/argocd-webhook-secrets.yaml
#
# This file defines an ArgoCD CR named example-argocd-webhook-secrets (same pattern as
# other examples/). For an existing instance named e.g. argocd, apply only the Secret
# and merge spec.webhookSecrets into your ArgoCD CR instead.
#
# Configuring webhook secrets (full guide — all providers, Sealed Secrets / ESO, migration, troubleshooting):
#   https://argocd-operator.readthedocs.io/en/latest/usage/webhook-secrets/
# (or docs/usage/webhook-secrets.md in this repository)
---
apiVersion: v1
kind: Secret
metadata:
  name: github-webhook-credentials
  labels:
    example: webhook-secrets
type: Opaque
stringData:
  token: "replace-with-your-github-webhook-secret"
---
apiVersion: argoproj.io/v1beta1
kind: ArgoCD
metadata:
  name: example-argocd-webhook-secrets
  labels:
    example: webhook-secrets
spec:
  webhookSecrets:
    github:
      webhookSecretRef:
        name: github-webhook-credentials
        key: token
